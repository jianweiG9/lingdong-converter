version: '3.8'

services:
  doc-converter:
    build: 
      context: .
      dockerfile: Dockerfile
    container_name: doc-converter
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - JAVA_OPTS=-Xmx2g -Xms1g
    volumes:
      - /tmp:/tmp
      - ./test-files:/app/test-files:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/convert/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - doc-converter-network

networks:
  doc-converter-network:
    driver: bridge