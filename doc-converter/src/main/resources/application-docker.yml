server:
  port: 8080

doc-converter:
  enabled: true
  # LibreOffice home directory in Docker container
  office-home: /usr/lib/libreoffice
  host-name: 127.0.0.1
  port-numbers: [2002, 2003, 2004]
  process-timeout: 180000  # 3 minutes (longer for container startup)
  process-retry-interval: 500
  after-start-process-delay: 3000
  start-fail-fast: false
  keep-alive-on-shutdown: false
  task-queue-timeout: 60000  # 1 minute
  task-execution-timeout: 180000  # 3 minutes
  max-tasks-per-process: 100

logging:
  level:
    com.docconverter: INFO
    root: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"

spring:
  servlet:
    multipart:
      max-file-size: 200MB
      max-request-size: 200MB
  application:
    name: document-converter

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always